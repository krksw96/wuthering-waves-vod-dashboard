name: Daily VOD Refresh

on:
  schedule:
    # 08:00 Asia/Shanghai = 00:00 UTC.
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      target_date:
        description: "Optional Asia/Shanghai target date (YYYY-MM-DD)."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: daily-vod-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      TARGET_DATE: ${{ inputs.target_date }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Refresh VOD data
        run: node scripts/daily-refresh.mjs
      - name: Commit refreshed data
        run: |
          if git diff --quiet; then
            echo "No data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/videos.js data/youtube-update-*.json index.html
          git commit -m "Daily VOD refresh $(date -u +%Y-%m-%d)"
          git push origin main
